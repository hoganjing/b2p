notes: |
  主播延伸锚定示例：作者讲“赤脚练柔道让脚重新分化使用”，可让听众现场脱鞋、用脚趾抓地做觉察练习。
  全书视角：寝技各章互相衔接（八→九→十→十一→十二 是连续的接近法/体位体系），章节间用“还记得第X章……”保持连续。
  图片：原书 300 张线描图已下载到 images/，口播稿里用行内（见图X）提示，但不独占一行（避免被 make_tts 剥掉）。
  外文处理铁律：正文纯中文，人名/书名/术语首现写“中文（原文）”，white 清单内的专有名词可裸出但尽量给中文译名。
