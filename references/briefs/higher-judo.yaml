# 每本书的 brief —— 摩谢·费登奎斯《Higher Judo: Groundwork / 高阶柔道：基础摔法》
# 本书是 1952 年初版的柔道教材，作者摩谢·费登奎斯（Feldenkrais Method 创始人）早年柔道著作。
# 重点在“地面技术 / 寝技（katame-waza）”。本书有 12 章正文 + 大量前言/导读/附录照片/传记。

