# 风格备注
notes: >
  本书是中文科普，正文天然夹杂大量英文术语、人名、数学变量与公式碎片；
  用户明确要求“中文书里可以有英文和字母，不必修改，保持原样”。
  故违背 skill 默认的“正文纯中文”规则，改为“英文/字母原样保留”。
  audit 门禁因此只用于抓 OCR 噪点（z-lib/archive/页码/图占位符等），
  不再把正文英文视为 strayEN。主播延伸照常叠加，锚定原论点，不引入书外事实。
