notes: |
  本书为神经科学科普/专著，作者 Antonio Damasio 为神经科学家。
  中文译名通行：《笛卡尔的错误：情绪、理性与人脑》（2005 Penguin 版）。
  主播延伸锚定示例：作者用“盖奇（Phineas Gage）前额叶受损后人格崩塌”说明理性依赖情绪，
  可让听众反思“自己有没有过纯粹靠逻辑却做错决定的时刻”。
  全书视角：贯穿全书的线索是“情绪与理性并非对立，而是理性决策的底层支撑”——
  写稿时在各章呼应这条主线（盖奇的悲剧 → 现代的艾略特 → 身体标记假说 → 推理的激情）。
  结构：Preface + Introduction 合为第〇集导读；三个 Part 为分册标题，并入其后首章作为节标题；
  Postscriptum 作为收尾独立短集。12 章正文 + 导读 + 后记。
