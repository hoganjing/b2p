# 书专用术语/纯中文例外说明
notes: |
  作者李笑来惯用英文缩写与产品名（如 MAKE=Minimal Actionable Knowledge and
  Experience，SOP，App，Google，Gmail，Kindle，TED，Uber，Airbnb，Evernote，
  Facebook，“得到”App 等）。这些作为白名单可直接出现在正文。
  本书为中文书，原文出现的英文（书名、术语、产品名、缩写，如 GAFATA、Excel、Python、
  VC、LinkedIn、PPT、TOEFL、MBA、GDP、CoBuild、Nature、Stack Overflow、YouTube、
  Amazon、Apple、AK-47、QQ、OPPO、VIVO、CMU、MIT、HHHHHH、free/freedom、hold、
  lack of general interest、regular investing 等）保持原样即可，已纳入 white 白名单，
  审计不再报 stray。无需强制包“中文（原文）”。
  章节标题行格式：第N章 · 中文标题（本书原题为中文，标题行写“第N章 · 中文标题”即可，
  英文原文 Financial Freedom 仅在导读标题出现一次）。
glossary:
  财富自由: financial freedom，被动收入覆盖生活开支，无需为钱出卖时间
  操作系统: 心智操作系统，指人的认知/思维模式，可升级
  七年就是一辈子: 作者观点，每七年可彻底重造一次自己
  MAKE: Minimal Actionable Knowledge and Experience，最小可行动知识与经验
  SOP: Standard Operating Procedure，标准操作流程
