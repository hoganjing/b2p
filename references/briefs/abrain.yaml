notes: |
  本书为科普/神经科学专著，作者 Min W. Jung 为神经科学家。
  主播延伸锚定示例：作者用“昆虫在生物量上远超人类”说明人类并非生物学最成功物种，可让听众反思“成功”的两种定义。
  全书视角：想象（imagination）是贯穿全书的线索——从海马体记忆到抽象思维到创新，写稿时在各章呼应这条主线。
  图表处理：源 PDF 含 Figure 0.1 等技术增长图，写稿时以行内（图0.1）自然语言描述，不写独立成行的标签行。
