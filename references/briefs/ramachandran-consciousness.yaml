notes: |
  本书由 BBC 雷思讲座（Reith Lectures, 2003）整理而成，共 5 章。
  分集：第〇集=序言导读，第1-4章各一集，第5章（神经科学——新哲学，最长）拆为 A、B 两集。
  主播延伸锚定示例：卡普格拉妄想→让听众试着闭眼想象母亲脸庞却“没感觉”的错位；幻肢镜盒→想象用镜子让麻痹的手动起来。
  全书视角：第1章提出“研究神经综合征反推正常脑功能”与“演化视角”两大主题，后续各章呼应。
  图（Figure 1.x 等）要写成口语描述，外文缩写如 V4 译为“V4（颜色加工区）”，正文纯中文。
